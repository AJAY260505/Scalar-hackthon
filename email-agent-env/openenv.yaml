name: email-triage-env

description: AI environment for classifying and prioritizing emails

observation_space:
  email_text: string
  email_id: int

action_space:
  category:
    type: string
    choices: [billing, technical, account, general]

  priority:
    type: string
    choices: [low, medium, high]

  action:
    type: string
    choices: [reply, archive, escalate]

reward:
  range: [0,1]